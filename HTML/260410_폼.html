<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>폼</title>
</head>
    
<body>
    <!-- div, span -->
    <!-- button: 누르면 자동 submint (제출) - type="submit" 이 기본.    -->
    <!-- readonly: 입력 불가. 따라서, value 속성이 필수 (그래야 의미 있으니까.)   -->
    <!-- disabled: 입력 불가. 비활성화. input 동작이 안된다. input 태그 자체를 없는 셈 침 -->

    <hr />
    
    <form action="260409_표.html">
        <div><span>아이디:</span> <input required type="text"></div>
        패스워드: <input type="password" autofocus placeholder="영 대/소문자, 숫자포함 5글자 이상"><br>
        EMAIL:<input type="email" tabindex="2" ><br>
        TEL:<input type="tel" tabindex="1" value="(053)-000-0000"><br>
        SEARCH:<input type="search" readonly><br>
        URL:<input type="url" disabled><br>

        <b>어떤 언어를 좋아하세요?</b><br>
        <label>
            C언어: <input type="checkbox">
        </label>
        Python: <input type="checkbox">

        <label for="java">JAVA:</label>
        <input id="java" type="checkbox">
        <br>

        <b>당신의 성별은?</b><br>
        남성: <input name="gender" type="radio">
        여성: <input name="gender" type="radio">
        <br>
        <!-- MIME TYPE: 마임 타입. 파일/데이터의 형식을 뜻함   -->
        파일: <input type="file" accept="image/*"> <br>
        파일 여러개: <input type="file" multiple> <br>
        <!-- hidden: 실제로 웹 페이지 상에서는 존재하지만 사용자들에게 숨기고 싶을 때 -->
        <input type="hidden">
        <br>
        <textarea cols="10" rows="2"></textarea>
        <br>
        <b>BUTTON 태그들</b>
        <button type="submit">SUBMIT</button>
        <button type="button">BUTTON</button>
        <button type="reset">RESET</button>
        <br>
        <b>INPUT 태그들</b>
        <input type="submit" value="SUBMIT">
        <input type="button" value="BUTTON">
        <input type="reset" value="RESET">
    </form>

</body>
</html>
