<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>표</title>
</head>
<body>
    <h3>표 예제1</h3>
    <table border="1">
        <tr>
            <td>열1</td>
            <td>열2</td>
            <td>열3</td>
        </tr>
        <tr>
            <td>열1</td>
            <td>열3</td>
        </tr>
        <tr>
            <td>열1</td>
            <td>열2</td>
            <td>열3</td>
        </tr>
    </table>

    <!-- deprecated: 더 이상 사용되지 않음(권장되지 않음)   -->
    <h3>표 예제2</h3>
    <table border="1">
        <caption>사람들 나이표</caption>
        <thead>
            <tr>
                <th>이름</th>
                <th>나이</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>김나나</td>
                <td>11</td>
            </tr>
            <tr>
                <td>홍길동</td>
                <td>20</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td></td>
                <td>나이의 합: 30</td>
            </tr>
        </tfoot>
    </table>

    <h3>표 예제3</h3>
    <table border="1" width="200">
        <tr>
            <td>1</td>
            <td colspan="2">2</td>
<!--            <td>3</td>-->
        </tr>
        <tr>
            <td rowspan="2">4</td>
            <td>5</td>
            <td>6</td>
        </tr>
        <tr>
<!--            <td>7</td>-->
            <td>8</td>
            <td>9</td>
        </tr>
        <tr>
            <td colspan="3">10</td>
<!--            <td>11</td>-->
<!--            <td>12</td>-->
        </tr>
    </table>
</body>
</html>
