<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Float</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
    }
    #box1{
        /*float: 요소의 흐름 제어. 요소를 왼쪽이나 오른족으로 띄워 배치
        뉴스 기사 등, 이미지와 글이 이어서 보여야 하는 경우 사용
        absolute와 다른 점: 다른 요소에 배치 영향 끼침
        */
        background-color: #ff11ef;
        float: left; /* 이 요소는 왼쪽 끝으로 밀고, 다른 요소들은 오른쪽에 이서어 배치하세요. */
    }
    #box2{
        background-color: #587dfa;
        float: left;
    }
    #box3{
        background-color: #50ba55;
        width: 200px;
        float: right;
    }
    #box4{
        background-color: #31fae4;
        /* 이전 요소가 float가 존재하면, 다음 요소도 자동으로 float 영향을 받아버림*/
        /* clear: both 으로 해제 (both 외, left, right, 사용 가능) */
        clear: both;
    }

    section {
        /* 자식 요소 전부가 float 속성이 있으면, 부모의 크기가 없어짐 */
        /* 자식이 없는 것처럼 판단됨 */
        /* height: 0 의 상태 => 높이를 인식하지 못함 */
        background-color: antiquewhite;
    }
    img{
        float: left;
    }
    p{
        width: 200px;
        float: left;
    }
    div
</style>
<body>
    <div id="box1">박스1</div>
    <div id="box2">박스2</div>
    <div id="box3">박스3</div>
    <div id="box4">박스4</div>
