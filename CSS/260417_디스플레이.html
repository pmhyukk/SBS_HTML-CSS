<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>디스플레이</title>
</head>

<style>
    div, span{
        width: 200px;
        height: 100px;
        border: 1px solid black;
        background-color: blueviolet;
    }
    div{
        /*
            인라인 요소: width, height 적용x, 콘텐츠 영역 크기만 차지
                => 글자처럼 판단함. 따라서 text-align: center 하면 중앙으로 감
            display: inline => 인라인 요소로 설정
        */
        display: inline;
        /* 인라인 요소에서 margin 은 양 옆만 적용된다. 위 아래는 적용x */
        margin: 100px; /* 상하좌우 100px 띄워 */
    }
    span{
        /*
            inline 속성과, block 속성을 전부 갖고 있음.
            => width, height, margin 전부 가능!
            => text-align: center 도 가능! (글자 처럼 취급)
            => 자신의 width, height 부분 영역을 가짐
        */
        display: inline-block;
    }

    /***************************************************/
    li{
        width: 100px;
        display: inline-block;
        background-color: black;
        list-style: none; /* 불릿 없애라 */
        text-align: center; /*li에 적힌 글자 중앙정렬*/
    }
    li > a{
        color: white;
        text-decoration: none; /* 밑줄 없애세요 */
        display: block;
        /*width: inherit; !* 상속. 부모로부터 물려받으세요. *!*/
        width: 100%;
        padding: 10px 0;
        cursor: pointer; /* 마우스 커서를 손모양으로 */
        /* 이 요소에 마우스를 올렸을 때 스타일을 변경해주세요. */
        &:hover{
            background-color: blueviolet;
        }
    }
</style>

<body>
<div>DIV1</div>
<div>DIV2</div>
<hr>
<span>SPAN1</span>
<span>SPAN2</span>

<table>
    <tr><td>table => display: table을 가짐</td></tr>
</table>

<ul>
    <li>li => display: list-item 속성 가짐</li>
</ul>
<hr>

<ul>
    <li><a href="#">HTML</a></li>
    <li><a href="#">CSS</a></li>
    <li><a href="#">JavaScript</a></li>
</ul>


</body>
</html>
