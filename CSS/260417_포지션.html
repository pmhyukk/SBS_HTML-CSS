<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>포지션</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
    }
    div{
        width: 100px;
        height: 100px;
    }
    #d1{
        display: inline-block;
        background-color: brown;
        /*
            position: 요소를 이동시키는 속성.
             => margin 과 다르게, 자신만 이동하여 다른 요소의 배치에 영향을 안줌
             기본값 = static.
             relative: 내가 원래 존재하던 위치에서부터 이동을 함.
         */
        position: relative;
        left: 100px; /* 왼쪽으로부터 100px 정도 띄워라 (오른쪽으로 100px이동) */
        /*margin-left: 100px;*/
    }
    #d2{
        display: inline-block;
        background-color: #31fae4;
    }
    #d3{
        /*
            absolute: 부모 위치를 기준으로 이동함.

        */
        position: absolute;
        top: 100px;
        left: 100px;
        background-color: #50ba55;
    }
    #d4{
        background-color: #ffcfff;
    }
    #d5{
        position: absolute;
        left: 50px;
        background-color: #552360;
    }
</style>
<body>
    <div id="d1">DIV1</div>
    <div id="d2">DIV2</div>
    <div id="d3">DIV3</div>
    <div id="d4">
        DIV4
        <div id="d5">DIV5</div>
    </div>
</body>
</html>
