<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>탐라국 입춘굿</title>
</head>

<style>
    #tam{
        color: orange;
        font-size: 20px;
    }
    .jeju{
        color: violet;
    }
    sup{
        font-style: italic;
    }
    div{
        text-align: center;
    }
    h1 > span{
        color: white;
        background-color: blue;
    }
</style>

<body>
    <h1>
        <span>
            탐라국 입춘굿
        </span>
    </h1>

    <p>
        <b>
            <span class="jeju">제주</span>도의 문화축제 중에서 유일하게 <span id="tam">탐라 시대부터 내려온 축제</span>이다.
        </b>
    </p>

    <p>
        <div>
            <span class="jeju">제주</span>에서 입춘은 새철 <sup>(<span class="jeju">제주</span>어, 샛절)</sup> 드는 날이라 한다.
        </div>
        하늘의 1만 8,000 신이 지상으로 내려와 새해 일들을 시작하는 때다.
    </p>
</body>
</html>
