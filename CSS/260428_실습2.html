    <title>뉴스 리스트 실습</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        ul{
            display: flex;
            flex-wrap: wrap;
            width: 600px;
        }

        li{
            position: relative;
            width: 200px;
            height: 100px;
            border: 1px solid black;

            display: flex;
            justify-content: center;
            align-items: center;
        }
        li:hover div{
            display: flex;
        }
        li div{
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            background-color: blue;
            color: white;
            justify-content: center;
            align-items: center;
        }
        li a{
            color: inherit;
        }
        li a:hover{
            font-weight: bold;
        }
        li a:first-child::after{
            content: "|";
            margin: 0 10px;
        }
    </style>
</head>
