<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>타입선택자</title>
</head>
<style>
    /*
        주석 처리
        ㅋ.ㅋ
    */
    *{
        font-size: 30px;
    }
    /* 태그(타입) 선택자. 태그 이름을 명시함 */
    div{
        color: indianred;
    }
    /* 클래스(class) 선택자. 태그에 해당 클래스가 들어있으면 선택됨 ('.' 사용)  */
    /* class='d' 인 요소들을 선택하세요 */
    .d{
        background-color: darkcyan;
    }
    .d2{
        font-weight: bold;
    }
    /* id선택자: '#'을 사용함. id="d5" 가 있는 요소를 선택함 */
    #d5{
        font-style: italic;
    }
    /* id=d5 인 요소와, a태그와, b태그에 적용해줘 */
    #d5, a, b {
        color: blueviolet;
    }
    .b2{
        font-size: larger;
    }

    ul{
        color: chocolate;
    }
</style>

<body>
    <span class="d">SPAN</span>
    <div>DIV1</div>
    <div class="d">DIV2</div>
    <!-- 클래스 속성은 값을 여러 개 넣을 수 있음. 각 값을 띄어쓰기로 구분함   -->
    <div class="d d2">DIV3</div>
    <div class="d2">DIV4</div>
    <!-- id는 문서 내에서 한 개만 존재할 때, 혹은 하나를 독자적으로 사용하고 싶을 때 사용   -->
    <div id="d5">DIV5</div>

    <br>
    <a href="#">A태그(링크)</a><br>
    <b>B태그(진하게)</b><br>
    <b class="b2">B태그2(진하게)</b><br>
    <!-- 스타일 상속. ul 태그에 스타일을 지정하면 li 태그에도 적용된다.   -->
    <ul>
        <li>
            <a href="#">LI의 A태그</a>
        </li>
        <li>
            <span>LI의 span태그</span>
        </li>
    </ul>


</body>
</html>
