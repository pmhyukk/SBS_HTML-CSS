<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>레이아웃1</title>
</head>
<style>
    header{
        background-color: antiquewhite;
    }
    #left{
        float: left;
        width: 200px;
        height: 1000px;
        background-color: powderblue;
    }
    #right{
        float: right;
        width: 200px;
        height: 1000px;
        background-color: powderblue;
    }
    main{
        float: left;
        width: 800px;
        height: 1000px;
        background-color: fuchsia;
    }
    footer{
        clear: both;
        background-color: gainsboro;
    }
</style>
<body>
    <header>HEADER</header>
    <aside id="left">ASIDE</aside>
    <main>MAIN</main>
    <aside id="right">ASIDE</aside>
    <footer>FOOTER</footer>
</body>
</html>
