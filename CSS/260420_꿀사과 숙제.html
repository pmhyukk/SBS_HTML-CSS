<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>뀰사과</title>
</head>

<style>
  section{
    width: 600px;
    border: 1px solid black;
  }

  h2{
    background-color: black;
    color: white;
  }
  h3{
    color: red;
  }
  span{
    color: blue;
  }
  div{
    text-align: center;
  }
  .apple{
    width: 600px;
    height: 350px;
    background-image: url("https://cdn.sisain.co.kr/news/photo/202401/51954_96818_5112.jpg");
    background-repeat: no-repeat;
    background-size: cover;
    background-position: center;
    padding-top: 220px;
    box-sizing: border-box;
  }

  .apple_text{
    background-color: rgba(0, 0, 0, 0.5);
    padding: 20px 30px;
    text-align: left;
  }

  .apple_text h1{
    margin: 0 0 15px 0;
    color: white;
    font-size: 40px;
  }

  .apple_text p{
    margin: 0;
    color: orange;
    font-size: 28px;
    font-weight: bold;
    line-height: 1.6;
  }
</style>

<body>
<section>

  <div class="apple">
    <div class="apple_text">
      <h1>가정용 꿀사과</h1>
      <p>흠집이 있고 약간은 못생겼지만 맛과 영양은 그대로입니다</p>
      <p>질좋은 사과를 저렴하게 즐겨보세요</p>
    </div>
  </div>

  <section>
    <h2>확인하세요</h2>

    <div>
      <h3>주문 및 배송</h3>
      <p>
        <span>오후 2시 이전</span> 주문건은 당일 발송합니다.
        2시 이후 주문건은 다음날 발송합니다.
      </p>
    </div>

    <div>
      <h3>교환 및 환불</h3>
      <p>
        불만족시 <span>100% 환불</span>해 드립니다.
        고객센터로 전화주세요
      </p>
    </div>

    <div>
      <h3>고객센터</h3>
      <p>
        0000-0000
        상담시간: 오전 9시 ~ 오후 6시 (토/일, 공휴일 휴무)
      </p>
    </div>
  </section>
</body>



</html>
