<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>뀰사과</title>
</head>

<style>
  .main_container{
    position: relative; /* div의 부모가 되기 위해 넣기 */
    height: 350px;
    background-image: url("https://plus.unsplash.com/premium_photo-1667049292983-d2524dd0ef08?q=80&w=1149&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
    background-position: center;
    background-size: cover;
    background-repeat: no-repeat;
  }
  .main_container > div{
    position: absolute;
    bottom: 0; /* 부모의 바닥에 붙이세요 */
    background-color: rgba(0, 0, 0, 0.5);
    text-align: left;
    padding: 2px 10px;
  }
  .main_container h1{
    color: white;
  }
  .main_container p{
    color: #dfdf31;
  }

  section{
    width: 600px;
    margin: 0 auto;
    border: 1px solid black;
    color: white;
  }

  h2{
    background-color: black;
    color: white;
  }
  h3{
    color: red;
  }
  span{
    color: blue;
  }
  div{
    text-align: center;
  }
</style>

<body>
<section class="main_container">
  <div>
    <h1>가정용 뀰사과</h1>
    <p>
      흠집이 있고 약간은 몬생겻지만 맛나요 <br>
      마이드세요 ^0^
    </p>
  </div>
</section>
<section>
  <h2>확인하세요</h2>

  <div>
    <h3>주문 및 배송</h3>
    <p>
      <span>오후 2시 이전</span> 주문건은 당일 발송합니다. <br>
      2시 이후 주문건은 다음날 발송합니다.
    </p>
  </div>

  <div>
    <h3>교환 및 환불</h3>
    <p>
      불만족시 <span>100% 환불</span>해 드립니다. <br>
      고객센터로 전화주세요
    </p>
  </div>

  <hr>

  <div>
    <h3>고객센터</h3>
    <p>
      0000-0000 <br>
      상담시간: 오전 9시 ~ 오후 6시 (토/일, 공휴일 휴무)
    </p>
  </div>
</section>
</body>
</html>
