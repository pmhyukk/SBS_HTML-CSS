<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>SVG</title>
</head>
<style>
    svg.bi{
      width: 100px;
      height: 100px;
      fill: cornflowerblue;
      stroke: darkslategray;
      stroke-width: 0.4px;
      stroke-dasharray: 2px;
    }

    .draw-path{
      /* 선의 총 길이를 점선 간격으로 */
      /* 500만큼의 실선을 그림 (500만큼 공백인 상태) */
      stroke-dasharray: 10;
      /* 선의 패턴을 정의 - 양수값을 주면 패턴을 왼쪽(앞쪽)으로 밀어낸다. */
      /* 실선 부분을 앞으로 500만큼 밀어서 눈앞에 500만큼 공백을 만든다 */
      stroke-dashoffset: 500;
      animation: draw 4s linear forwards infinite;

      stroke: #ff11ef;
      stroke-width: 5;
      fill: none;
    }
    @keyframes draw {
      to{
        /* 공백을 0으로 줄임으로서 이어지는 것처럼 된다 */
        stroke-dashoffset: 0;
      }

    }
</style>
<body>
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-down-left-circle-fill" viewBox="0 0 16 16">
        <path d="M16 8A8 8 0 1 0 0 8a8 8 0 0 0 16 0m-5.904-2.803a.5.5 0 1 1 .707.707L6.707 10h2.768a.5.5 0 0 1 0 1H5.5a.5.5 0 0 1-.5-.5V6.525a.5.5 0 0 1 1 0v2.768z"/>
    </svg>

    <svg width="200" height="200">
      <rect x="10" y="10" width="150" height="150" class="draw-path"></rect>
    </svg>
</body>
</html>
