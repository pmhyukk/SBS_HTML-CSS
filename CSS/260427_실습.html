<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>네이버 웨일 새 탭</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            background-color: black;
        }

        .btn-list{
            display: flex;
            justify-content: center;
            align-items: center;
            list-style: none;
            flex-wrap: wrap;
        }
        .btn-list > li{
            margin: 0 10px;
        }

        .icon-btn{
            text-align: center;
            padding: 2px 4px;
            cursor: pointer;
            border: none;
            background-color: unset;
        }
        .icon-container{
            position: relative;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 50px;
            height: 50px;
            background-color: white;
            border-radius: 20%;
        }
        .icon-btn > .title{
            margin-top: 2px;
            font-size: 8px;
            font-weight: bold;
            color: white;
        }
        .more-container{
            position: absolute;
            top: -5px;
            right: -5px;
            display: none;
            justify-content: center;
            align-items: center;
            width: 20px;
            height: 20px;
            background-color: lightgray;
            border-radius: 50%;
        }

        .icon-btn:hover .more-container{
            display: flex;
        }


    </style>
</head>
<body>
<ul class="btn-list">
    <li>
        <button class="icon-btn">
            <div class="icon-container">
                <i class="bi bi-airplane-fill"></i>
                <div class="more-container">
                    <i class="bi bi-three-dots"></i>
                </div>
            </div>
            <div class="title">항공편 예약</div>
