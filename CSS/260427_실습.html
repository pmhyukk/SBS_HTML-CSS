<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>네이버 웨일 새 탭</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            background-color: black;
        }
        main{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .search-container{
            display: inline-flex;
            margin-bottom: 40px;
            padding: 6px 10px;
            background-color: #9c9c75;
            border-radius: 16px;
            transition-duration: 1s;
        }

        .search-container:hover{
            background-color: #939393;
        }

        .search-container > button{
            display: inline-flex;
            width: 25px;
            margin-right: 5px;
            justify-content: center;
            align-items: center;
            border: none;
            background: none;
            cursor: pointer;
        }
        .search-container > button > svg{
            fill: white;
        }
        .search-container input{
            outline: none;
            border: none;
            color: white;
            background-color: inherit; /* 상속. */
        }
        .search-container input::placeholder{
            color: white;
        }

        /**/


        .btn-list{
            display: flex;
            justify-content: center;
            align-items: center;
            list-style: none;
            flex-wrap: wrap;
        }
        .btn-list > li{
            margin: 0 10px;
        }

        .icon-btn{
            text-align: center;
            padding: 2px 4px;
            cursor: pointer;
            border: none;
            background-color: unset;
        }
        .icon-container{
            position: relative;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 50px;
            height: 50px;
            background-color: white;
            border-radius: 20%;
        }
        .icon-btn > .title{
            margin-top: 2px;
            font-size: 8px;
            font-weight: bold;
            color: white;
        }
        .more-container{
            position: absolute;
            top: -5px;
            right: -5px;
            display: none;
            justify-content: center;
            align-items: center;
            width: 20px;
            height: 20px;
            background-color: lightgray;
            border-radius: 50%;
        }

        .icon-btn:hover .more-container{
            display: flex;
        }
        i{
            font-size: 20px;
        }
    </style>
</head>
<body>
<main>
    <label class="search-container">
        <button>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-down-left-circle-fill" viewBox="0 0 16 16">
                <path d="M16 8A8 8 0 1 0 0 8a8 8 0 0 0 16 0m-5.904-2.803a.5.5 0 1 1 .707.707L6.707 10h2.768a.5.5 0 0 1 0 1H5.5a.5.5 0 0 1-.5-.5V6.525a.5.5 0 0 1 1 0v2.768z"/>
            </svg>
        </button>
        <input type="text" placeholder="검색어 입력하삼">
    </label>
    <ul class="btn-list">
        <li>
            <button class="icon-btn">
                <div class="icon-container">
                    <i class="bi bi-airplane-fill"></i>
                    <div class="more-container">
                        <i class="bi bi-three-dots"></i>
                    </div>
                </div>
                <div class="title">항공편 예약</div>
            </button>
        </li>
        <li>
            <button class="icon-btn">
                <div class="icon-container">
                    <i class="bi bi-airplane-fill"></i>
                    <div class="more-container">
                        <i class="bi bi-three-dots"></i>
                    </div>
                </div>
                <div class="title">항공편 예약</div>
            </button>
        </li>
        <li>
            <button class="icon-btn">
                <div class="icon-container">
                    <i class="bi bi-airplane-fill"></i>
                    <div class="more-container">
                        <i class="bi bi-three-dots"></i>
                    </div>
                </div>
                <div class="title">항공편 예약</div>
            </button>
        </li>
        <li>
            <button class="icon-btn">
                <div class="icon-container">
                    <i class="bi bi-airplane-fill"></i>
                    <div class="more-container">
                        <i class="bi bi-three-dots"></i>
                    </div>
                </div>
                <div class="title">항공편 예약</div>
            </button>
        </li>
        <li>
            <button class="icon-btn">
                <div class="icon-container">
                    <i class="bi bi-airplane-fill"></i>
                    <div class="more-container">
                        <i class="bi bi-three-dots"></i>
                    </div>
                </div>
                <div class="title">항공편 예약</div>
            </button>
        </li>
        <li>
            <button class="icon-btn">
                <div class="icon-container">
                    <i class="bi bi-airplane-fill"></i>
                    <div class="more-container">
                        <i class="bi bi-three-dots"></i>
                    </div>
                </div>
                <div class="title">항공편 예약</div>
            </button>
        </li>
    </ul>
</main>
</body>
</html>
