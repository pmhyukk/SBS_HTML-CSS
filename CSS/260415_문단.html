<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        ul{
            border: 1px solid blue;
            /*list-style-position: inside;*/
            /*list-style-type: "🎄";*/
            /*list-style-image: url("https://img.khan.co.kr/news/2019/11/08/l_2019110801001014500075872.jpg");*/
            list-style: none;
        }

        table{
            width: 300px;
            border: 3px solid blueviolet;
            border-collapse: separate;
            border-spacing: 19px;
        }
        td{
            text-align: center;
            width: 20px;
            border: 1px solid blue;
        }
        .col1{
            font-weight: bold;
        }
    </style>
</head>
<body>
    <ul>
        <li>UL-LI1</li>
        <li>UL-LI2</li>
        <li>UL-LI3</li>
    </ul>

    <ol type="A">
        <li>OL-LI1</li>
        <li>OL-LI2</li>
        <li>OL-LI3</li>
    </ol>

    <hr>

    <table>
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
        </tr>

        <tr>
            <td>4</td>
            <td>5</td>
            <td>6</td>
        </tr>
    </table>


    <!-- 열: column / 행: row    -->
    <table>
        <colgroup>
            <col class="col1">
            <col class="col2">
            <col class="col3">
        </colgroup>
        <thead>
            <tr><th>A</th></tr>
        </thead>
        <tbody>
            <tr>
                <td>B</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>C</td>
            </tr>
        </tfoot>
    </table>







</body>
</html>
